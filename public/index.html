<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filom · 文件中心 & 聊天室</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3248; --accent: #6c63ff; --accent-h: #8b85ff;
      --text: #e2e4f0; --text-muted: #7880a8;
      --danger: #f05a5a; --success: #43d49e;
      --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.45);
    }
    html, body { height: 100%; font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    header .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    header .logo span { color: var(--text-muted); font-weight: 400; font-size: 14px; margin-left: 8px; }
    header nav { margin-left: auto; display: flex; gap: 4px; }
    header nav button {
      padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 500; transition: all .18s;
      background: transparent; color: var(--text-muted);
    }
    header nav button.active { background: var(--accent); color: #fff; }
    header nav button:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* ── Layout ── */
    .app { flex: 1; display: flex; overflow: hidden; }
    .panel { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .panel.visible { display: flex; }

    /* ── File Panel ── */
    .file-panel { padding: 24px 28px; gap: 20px; overflow-y: auto; }

    /* Mode toggle */
    .mode-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border-radius: var(--radius);
      padding: 4px; width: fit-content; border: 1px solid var(--border);
    }
    .mode-btn {
      padding: 6px 18px; border-radius: 8px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 500; background: transparent; color: var(--text-muted);
      transition: all .18s;
    }
    .mode-btn.active { background: var(--accent); color: #fff; }
    .mode-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      background: var(--surface); padding: 32px 24px; text-align: center;
      cursor: pointer; transition: all .2s; position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent); background: rgba(108,99,255,.07);
    }
    .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-zone .icon { font-size: 44px; margin-bottom: 10px; }
    .upload-zone p { color: var(--text-muted); font-size: 14px; }
    .upload-zone p strong { color: var(--text); }

    /* Progress */
    .upload-progress { display: none; margin-top: 12px; }
    .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; width: 0%; }
    .progress-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; text-align: right; }

    /* File list header */
    .file-list-header { display: flex; align-items: center; justify-content: space-between; }
    .file-list-header h2 { font-size: 16px; font-weight: 600; }
    .file-count { font-size: 13px; color: var(--text-muted); background: var(--surface2); padding: 2px 10px; border-radius: 99px; }

    /* File table */
    .file-table { width: 100%; border-collapse: collapse; }
    .file-table th {
      text-align: left; font-size: 12px; text-transform: uppercase;
      letter-spacing: .6px; color: var(--text-muted);
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .file-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
    .file-table tr:last-child td { border-bottom: none; }
    .file-table tr:hover td { background: rgba(255,255,255,.03); }
    .file-icon { font-size: 20px; margin-right: 8px; vertical-align: middle; }
    .file-name-cell { display: flex; align-items: center; }
    .file-name { font-weight: 500; word-break: break-all; }

    /* Image gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    .gallery-item {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; transition: transform .18s, border-color .18s;
      position: relative;
    }
    .gallery-item:hover { transform: translateY(-2px); border-color: var(--accent); }
    .gallery-item img { width: 100%; height: 130px; object-fit: cover; display: block; }
    .gallery-item .gallery-info {
      padding: 8px 10px; font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .gallery-item .gallery-actions {
      position: absolute; top: 6px; right: 6px;
      display: none; gap: 4px;
    }
    .gallery-item:hover .gallery-actions { display: flex; }
    .gallery-action-btn {
      background: rgba(0,0,0,.65); border: none; border-radius: 6px;
      color: #fff; cursor: pointer; font-size: 13px; padding: 4px 8px;
      backdrop-filter: blur(4px);
    }
    .gallery-action-btn:hover { background: var(--accent); }
    .gallery-empty { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); }
    .gallery-empty .big { font-size: 44px; margin-bottom: 10px; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all .18s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); }
    .btn-danger:hover { background: rgba(240,90,90,.12); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .empty-state { text-align: center; padding: 40px 24px; color: var(--text-muted); }
    .empty-state .big { font-size: 44px; margin-bottom: 12px; }

    /* Toast */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 8px;
      animation: slideIn .25s ease; box-shadow: var(--shadow); min-width: 220px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Chat Panel ── */
    .chat-panel { display: none; flex-direction: column; height: 100%; }
    .chat-panel.visible { display: flex; }

    .chat-topbar {
      padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .chat-topbar .room-info { font-size: 15px; font-weight: 600; }
    .chat-topbar .online-badge {
      font-size: 12px; color: var(--success); background: rgba(67,212,158,.12);
      padding: 2px 10px; border-radius: 99px; display: flex; align-items: center; gap: 4px;
    }
    .online-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; display: inline-block; }
    #ws-status { font-size: 12px; color: var(--text-muted); margin-left: auto; display: flex; align-items: center; gap: 5px; }
    #ws-status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
    #ws-status.connected .dot { background: var(--success); }
    #ws-status.disconnected .dot { background: var(--danger); }
    .chat-topbar .rename-form { display: flex; gap: 8px; }
    .chat-topbar input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 12px; color: var(--text); font-size: 13px; width: 140px; outline: none;
    }
    .chat-topbar input:focus { border-color: var(--accent); }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg { display: flex; gap: 10px; max-width: 75%; }
    .msg.self { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0; color: #fff;
    }
    .msg.self .msg-avatar { background: #3d8a6e; }
    .msg-body { display: flex; flex-direction: column; gap: 4px; }
    .msg-meta { font-size: 11px; color: var(--text-muted); }
    .msg.self .msg-meta { text-align: right; }
    .msg-bubble {
      background: var(--surface2); border-radius: 16px; padding: 10px 14px;
      font-size: 14px; line-height: 1.55; word-break: break-word;
      border: 1px solid var(--border);
    }
    .msg.self .msg-bubble { background: var(--accent); border-color: transparent; color: #fff; }
    .msg-system {
      text-align: center; font-size: 12px; color: var(--text-muted);
      background: var(--surface2); border-radius: 99px; padding: 4px 16px;
      align-self: center;
    }

    /* Image message */
    .msg-image .msg-bubble { background: transparent; border: none; padding: 0; }
    .msg-image img {
      max-width: 300px; max-height: 260px; border-radius: 14px;
      cursor: zoom-in; object-fit: cover; display: block;
      border: 1px solid var(--border); transition: transform .18s, opacity .18s;
    }
    .msg-image img:hover { transform: scale(1.02); opacity: .9; }
    .msg.self.msg-image img { border-color: transparent; }

    /* Pending image */
    .pending-img-wrap {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px;
    }
    .pending-img-wrap img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
    .pending-name { flex: 1; font-size: 13px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .remove-pending { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
    .remove-pending:hover { color: var(--danger); }

    /* Input area */
    .chat-input-area { padding: 14px 24px; background: var(--surface); border-top: 1px solid var(--border); }
    .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
    #chat-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; color: var(--text);
      font-size: 14px; outline: none; resize: none; min-height: 48px;
      max-height: 140px; line-height: 1.5; font-family: inherit; transition: border-color .18s;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text-muted); }
    #send-img-btn {
      width: 48px; height: 48px; border-radius: var(--radius); border: none;
      background: var(--surface2); color: var(--text); cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .18s;
    }
    #send-img-btn:hover { background: var(--border); }
    #send-btn {
      width: 48px; height: 48px; border-radius: var(--radius); border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .18s, transform .1s;
    }
    #send-btn:hover { background: var(--accent-h); }
    #send-btn:active { transform: scale(.94); }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: right; }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88);
      z-index: 99999; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw; max-height: 80vh; border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    #lightbox-caption { color: rgba(255,255,255,.6); font-size: 13px; }
    #lightbox-close {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #fff; border-radius: 50%; width: 40px; height: 40px;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #lightbox-close:hover { background: rgba(255,255,255,.2); }

    @media (max-width: 640px) {
      .file-panel { padding: 16px; }
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .gallery-item img { height: 100px; }
      .msg-image img { max-width: 200px; max-height: 180px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">filom <span>/ 文件中心 & 聊天室</span></div>
  <nav>
    <button class="active" id="tab-files" onclick="switchTab('files')">📁 文件</button>
    <button id="tab-chat" onclick="switchTab('chat')">💬 聊天</button>
    <a href="/upload.html" style="padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:4px;transition:all .18s;" onmouseover="this.style.background='var(--surface2)';this.style.color='var(--text)'" onmouseout="this.style.background='transparent';this.style.color='var(--text-muted)'">🚀 大文件</a>
  </nav>
</header>

<div class="app">

  <!-- ══════════════ File Panel ══════════════ -->
  <div class="panel file-panel visible" id="panel-files">

    <!-- View mode toggle -->
    <div class="mode-bar">
      <button class="mode-btn active" id="mode-table" onclick="setFileMode('table')">📋 列表</button>
      <button class="mode-btn" id="mode-gallery" onclick="setFileMode('gallery')">🖼️ 画廊</button>
    </div>

    <!-- Upload zone -->
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" multiple />
      <div class="icon">☁️</div>
      <p><strong>点击选择文件</strong>，或将文件拖拽到此处</p>
      <p style="margin-top:6px">单次最大 200 MB，支持任意格式</p>
    </div>

    <!-- Progress -->
    <div class="upload-progress" id="upload-progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0%</div>
    </div>

    <!-- File list -->
    <div class="file-list-header">
      <h2>已上传文件</h2>
      <span class="file-count" id="file-count">0 个文件</span>
    </div>

    <div id="file-list-container">
      <div class="empty-state">
        <div class="big">📭</div>
        <div>暂无文件，快上传第一个吧</div>
      </div>
    </div>

  </div>

  <!-- ══════════════ Chat Panel ══════════════ -->
  <div class="panel chat-panel" id="panel-chat">

    <div class="chat-topbar">
      <div class="room-info">🌐 公共聊天室</div>
      <div class="online-badge"><span class="online-dot"></span><span id="online-count">1</span> 人在线</div>
      <div id="ws-status" class="disconnected">
        <span class="dot"></span><span id="ws-label">连接中…</span>
      </div>
      <div class="rename-form">
        <input type="text" id="username-input" placeholder="修改昵称" maxlength="20" />
        <button class="btn btn-ghost btn-sm" onclick="rename()">确认</button>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="msg-system">欢迎来到聊天室 🎉</div>
    </div>

    <div class="chat-input-area">
      <div id="pending-img-container" style="display:none"></div>
      <div class="chat-input-row">
        <button id="send-img-btn" title="发送图片" onclick="triggerImgSelect()">🖼️</button>
        <input type="file" id="img-input" accept="image/jpeg,image/png,image/gif,image/webp,image/svg+xml" style="display:none" onchange="handleImgSelect(this.files)" />
        <textarea id="chat-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
        <button id="send-btn" onclick="sendMsg()">➤</button>
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <img id="lightbox-img" src="" alt="" />
  <div id="lightbox-caption"></div>
  <button id="lightbox-close" onclick="closeLightbox(event)">✕</button>
</div>

<script>
// ════════════════════════════════════════════════
//  Tab Switching
// ════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('header nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
  document.getElementById('panel-' + tab).classList.add('visible');
}

// ════════════════════════════════════════════════
//  Toast
// ════════════════════════════════════════════════
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ════════════════════════════════════════════════
//  Helpers
// ════════════════════════════════════════════════
function formatBytes(bytes) {
  if (!bytes) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
}

function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = {
    pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📑', pptx:'📑',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️',
    mp4:'🎬', mov:'🎬', avi:'🎬', mp3:'🎵', wav:'🎵',
    zip:'🗜️', rar:'🗜️', '7z':'🗜️', txt:'📃',
    json:'🔧', js:'🔧', ts:'🔧', html:'🌐', css:'🎨', sh:'💻', py:'🐍',
  };
  return map[ext] || '📦';
}

function isImageFile(name) {
  return /\.(png|jpe?g|gif|webp|svg)$/i.test(name);
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════
//  File List
// ════════════════════════════════════════════════
let allFiles = [];

async function loadFiles() {
  try {
    const res = await fetch('/api/files');
    const { files } = await res.json();
    allFiles = files;
    renderFiles(files);
  } catch (e) {
    toast('获取文件列表失败', 'error');
  }
}

// ════════════════════════════════════════════════
//  File Mode (table / gallery)
// ════════════════════════════════════════════════
let fileMode = 'table';

function setFileMode(mode) {
  fileMode = mode;
  document.getElementById('mode-table').classList.toggle('active', mode === 'table');
  document.getElementById('mode-gallery').classList.toggle('active', mode === 'gallery');
  renderFiles(allFiles);
}

function renderFiles(files) {
  document.getElementById('file-count').textContent = files.length + ' 个文件';
  const container = document.getElementById('file-list-container');

  if (!files || !files.length) {
    container.innerHTML = '<div class="empty-state"><div class="big">📭</div><div>暂无文件，快上传第一个吧</div></div>';
    return;
  }

  if (fileMode === 'gallery') {
    const images = files.filter(f => isImageFile(f.name));
    if (!images.length) {
      container.innerHTML = '<div class="gallery-grid"><div class="gallery-empty"><div class="big">🖼️</div><div>暂无图片文件</div></div></div>';
      return;
    }
    const items = images.map(f => {
      const encoded = encodeURIComponent(f.name);
      const safeName = escAttr(f.name);
      const safeEncoded = escAttr(encoded);
      return '<div class="gallery-item" onclick="openLightbox(\'/uploads/' + safeEncoded + '\', \'' + safeName + '\')">' +
        '<img src="/uploads/' + safeEncoded + '" alt="' + safeName + '" loading="lazy" />' +
        '<div class="gallery-info">' + escHtml(f.name) + '</div>' +
        '<div class="gallery-actions">' +
          '<button class="gallery-action-btn" onclick="event.stopPropagation(); downloadFile(\'' + safeEncoded + '\')">⬇</button>' +
          '<button class="gallery-action-btn" onclick="event.stopPropagation(); deleteFile(\'' + safeEncoded + '\')" style="background:rgba(240,90,90,.8)">🗑</button>' +
        '</div></div>';
    }).join('');
    container.innerHTML = '<div class="gallery-grid">' + items + '</div>';
    return;
  }

  // Table mode
  const rows = files.map(f => {
    const encoded = encodeURIComponent(f.name);
    const safeName = escAttr(f.name);
    const safeEncoded = escAttr(encoded);
    const imgPreviewBtn = isImageFile(f.name)
      ? '<button class="btn btn-ghost btn-sm" onclick="openLightbox(\'/uploads/' + safeEncoded + '\', \'' + safeName + '\')">🔍 预览</button>'
      : '';
    return '<tr><td><div class="file-name-cell"><span class="file-icon">' + fileIcon(f.name) + '</span><div class="file-name">' + escHtml(f.name) + '</div></div></td>' +
      '<td>' + formatBytes(f.size) + '</td>' +
      '<td>' + new Date(f.createdAt).toLocaleString('zh-CN') + '</td>' +
      '<td>' + imgPreviewBtn +
        '<button class="btn btn-ghost btn-sm" onclick="downloadFile(\'' + safeEncoded + '\')">⬇ 下载</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteFile(\'' + safeEncoded + '\')">🗑</button></td></tr>';
  }).join('');

  container.innerHTML = '<table class="file-table"><thead><tr><th>文件名</th><th>大小</th><th>上传时间</th><th>操作</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

// ════════════════════════════════════════════════
//  Upload
// ════════════════════════════════════════════════
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

fileInput.addEventListener('change', () => uploadFiles(fileInput.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  uploadFiles(e.dataTransfer.files);
});

async function uploadFiles(files) {
  if (!files || !files.length) return;
  const prog = document.getElementById('upload-progress');
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  prog.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const fd = new FormData();
    fd.append('file', file);
    await new Promise(resolve => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          fill.style.width = pct + '%';
          label.textContent = '(' + (i+1) + '/' + files.length + ') ' + file.name + ' — ' + pct + '%';
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) toast('✅ ' + file.name + ' 上传成功', 'success');
        else toast('❌ ' + file.name + ' 上传失败', 'error');
        resolve();
      };
      xhr.onerror = () => { toast('❌ ' + file.name + ' 网络错误', 'error'); resolve(); };
      xhr.send(fd);
    });
  }

  fill.style.width = '100%';
  label.textContent = '上传完成';
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 1500);
  fileInput.value = '';
  loadFiles();
}

// ════════════════════════════════════════════════
//  Download & Delete
// ════════════════════════════════════════════════
function downloadFile(name) {
  const a = document.createElement('a');
  a.href = '/api/download/' + name;
  a.download = decodeURIComponent(name);
  a.click();
}

async function deleteFile(name) {
  const decoded = decodeURIComponent(name);
  if (!confirm('确定要删除 "' + decoded + '" 吗？')) return;
  try {
    const res = await fetch('/api/files/' + name, { method: 'DELETE' });
    if (res.ok) { toast('已删除', 'success'); loadFiles(); }
    else toast('删除失败', 'error');
  } catch { toast('删除失败', 'error'); }
}

// ════════════════════════════════════════════════
//  Lightbox
// ════════════════════════════════════════════════
function openLightbox(url, caption) {
  if (!url) return;
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-caption').textContent = caption || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(e) {
  if (e && e.target !== e.currentTarget && e.target.id !== 'lightbox-close') return;
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ════════════════════════════════════════════════
//  WebSocket Chat
// ════════════════════════════════════════════════
let ws, myId, myName = '';
let wsReconnectTimer = null;
let pendingImage = null;

function connectWS() {
  ws = new WebSocket('ws://' + location.host + '/ws/chat');
  ws.addEventListener('open',  () => setWsStatus(true));
  ws.addEventListener('close', () => {
    setWsStatus(false);
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = setTimeout(connectWS, 3000);
  });
  ws.addEventListener('message', e => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'welcome') {
      myId = msg.userId;
      myName = msg.userName;
      document.getElementById('username-input').placeholder = myName;
      if (msg.history && msg.history.length > 0) {
        appendSystem('— 加载了 ' + msg.history.length + ' 条历史消息 —');
        msg.history.forEach(m => renderChatMsg(m));
      }
      appendSystem('你的昵称：' + myName);
      return;
    }

    if (msg.type === 'renamed') {
      myName = msg.name;
      document.getElementById('username-input').value = '';
      document.getElementById('username-input').placeholder = myName;
      appendSystem('昵称已改为：' + myName);
      return;
    }

    if (msg.type === 'online') {
      document.getElementById('online-count').textContent = msg.count;
      return;
    }

    if (msg.type === 'message') { renderChatMsg(msg); return; }
    if (msg.type === 'image')   { renderChatMsg(msg); return; }
  });
}

// ── Unified renderer (live + history) ────────────────────────
function renderChatMsg(msg) {
  if (msg.type === 'image') {
    // url field is guaranteed to exist for both live and stored images
    const imgSrc = msg.url || ('/uploads/' + (msg.savedName || msg.saved_name));
    appendImageMsg({ from: msg.sender || msg.from, url: imgSrc, time: msg.created_at || msg.time });
  } else {
    appendTextMsg({ from: msg.sender || msg.from, content: msg.content, time: msg.created_at || msg.time });
  }
}

function setWsStatus(connected) {
  const el = document.getElementById('ws-status');
  el.className = connected ? 'connected' : 'disconnected';
  document.getElementById('ws-label').textContent = connected ? '已连接' : '已断开，重连中…';
}

function appendTextMsg(msg) {
  const isSelf = msg.from === myName;
  const div = document.createElement('div');
  div.className = 'msg' + (isSelf ? ' self' : '');
  const time = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = '<div class="msg-avatar">' + escHtml(msg.from.slice(-2)) + '</div>' +
    '<div class="msg-body"><div class="msg-meta">' + escHtml(msg.from) + ' · ' + time + '</div>' +
    '<div class="msg-bubble">' + escHtml(msg.content).replace(/\n/g, '<br>') + '</div></div>';
  appendToChat(div);
}

function appendImageMsg(msg) {
  const isSelf = msg.from === myName;
  const time = new Date(msg.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const safeUrl = escAttr(msg.url);
  const div = document.createElement('div');
  div.className = 'msg msg-image' + (isSelf ? ' self' : '');
  div.innerHTML = '<div class="msg-avatar">' + escHtml(msg.from.slice(-2)) + '</div>' +
    '<div class="msg-body"><div class="msg-meta">' + escHtml(msg.from) + ' · ' + time + '</div>' +
    '<div class="msg-bubble">' +
      '<img src="' + safeUrl + '" alt="图片" loading="lazy" onclick="openLightbox(\'' + safeUrl + '\', \'' + escAttr(msg.from) + '\')" />' +
    '</div></div>';
  appendToChat(div);
}

function appendSystem(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  appendToChat(div);
}

function appendToChat(el) {
  const container = document.getElementById('chat-messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ════════════════════════════════════════════════
//  Send Message
// ════════════════════════════════════════════════
function sendMsg() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { toast('连接断开，请稍候重试', 'error'); return; }

  if (pendingImage) {
    const fd = new FormData();
    fd.append('image', pendingImage.file);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/chat/upload');
    xhr.onload = () => {
      if (xhr.status === 200) {
        const data = JSON.parse(xhr.responseText);
        ws.send(JSON.stringify({ type: 'image', savedName: data.savedName, url: data.url }));
        toast('图片已发送', 'success');
      } else {
        toast('图片上传失败', 'error');
      }
      clearPendingImage();
    };
    xhr.onerror = () => { toast('图片上传失败', 'error'); clearPendingImage(); };
    xhr.send(fd);
    return;
  }

  const content = document.getElementById('chat-input').value.trim();
  if (!content) return;
  ws.send(JSON.stringify({ type: 'message', content }));
  document.getElementById('chat-input').value = '';
  document.getElementById('chat-input').style.height = 'auto';
}

// ── Image Selection ─────────────────────────────────────────
function triggerImgSelect() { document.getElementById('img-input').click(); }

function handleImgSelect(files) {
  if (!files || !files.length) return;
  const file = files[0];
  if (!file.type.startsWith('image/')) { toast('请选择图片文件', 'error'); return; }
  if (file.size > 10 * 1024 * 1024) { toast('图片大小不能超过 10 MB', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingImage = { file, dataUrl: e.target.result };
    renderPendingImage();
  };
  reader.readAsDataURL(file);
}

function renderPendingImage() {
  const container = document.getElementById('pending-img-container');
  if (!pendingImage) { container.style.display = 'none'; return; }
  container.style.display = 'block';
  container.innerHTML = '<div class="pending-img-wrap">' +
    '<img src="' + pendingImage.dataUrl + '" alt="预览" />' +
    '<div class="pending-name">' + escHtml(pendingImage.file.name) + '</div>' +
    '<button class="remove-pending" onclick="clearPendingImage()">✕</button></div>';
}

function clearPendingImage() {
  pendingImage = null;
  document.getElementById('pending-img-container').style.display = 'none';
  document.getElementById('img-input').value = '';
}

function rename() {
  const name = document.getElementById('username-input').value.trim();
  if (!name) return;
  ws.send(JSON.stringify({ type: 'rename', name }));
}

// ── Input Events ─────────────────────────────────────────────
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') rename();
});

// ════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════
loadFiles();
connectWS();
</script>
