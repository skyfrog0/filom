<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filom · 大文件上传</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3248; --accent: #6c63ff; --accent-h: #8b85ff;
      --text: #e2e4f0; --text-muted: #7880a8;
      --danger: #f05a5a; --success: #43d49e; --warning: #f5a623;
      --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,.45);
    }
    html, body { height: 100%; font-family: 'Segoe UI', 'PingFang SC', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }
    .logo span { color: var(--text-muted); font-weight: 400; font-size: 14px; margin-left: 8px; }
    .back-btn {
      margin-left: auto; padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px;
      text-decoration: none; display: flex; align-items: center; gap: 5px; transition: all .18s;
    }
    .back-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── Main ── */
    main { flex: 1; padding: 32px 28px; max-width: 900px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

    h1 { font-size: 20px; font-weight: 700; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    /* ── Settings Bar ── */
    .settings-bar {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px;
    }
    .settings-bar label { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
    .settings-bar input[type=range] { width: 120px; accent-color: var(--accent); }
    .settings-bar .val { color: var(--text); font-weight: 600; min-width: 60px; }
    .settings-bar select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 5px 10px; font-size: 13px; outline: none;
    }

    /* ── Drop Zone ── */
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      background: var(--surface); padding: 48px 24px; text-align: center;
      cursor: pointer; transition: all .2s; position: relative; min-height: 180px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent); background: rgba(108,99,255,.07);
    }
    .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone .dz-icon { font-size: 52px; }
    .drop-zone .dz-title { font-size: 16px; font-weight: 600; }
    .drop-zone .dz-sub { font-size: 13px; color: var(--text-muted); }

    /* ── Upload Queue ── */
    .queue-header { display: flex; align-items: center; justify-content: space-between; }
    .queue-header h2 { font-size: 16px; font-weight: 600; }
    .queue-actions { display: flex; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 16px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all .18s;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid transparent; }
    .btn-danger:hover:not(:disabled) { background: rgba(240,90,90,.12); border-color: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── File Items ── */
    .file-list { display: flex; flex-direction: column; gap: 12px; }

    .file-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color .18s;
    }
    .file-item.uploading { border-color: var(--accent); }
    .file-item.done { border-color: var(--success); }
    .file-item.error { border-color: var(--danger); }
    .file-item.paused { border-color: var(--warning); }
    .file-item.waiting_file { border-color: var(--warning); border-style: dashed; }

    .file-item-top { display: flex; align-items: center; gap: 12px; }
    .file-icon-big { font-size: 28px; flex-shrink: 0; }
    .file-meta { flex: 1; min-width: 0; }
    .file-meta .name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta .info { font-size: 12px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }
    .file-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* Progress */
    .progress-wrap { display: flex; flex-direction: column; gap: 5px; }
    .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .3s; width: 0%; }
    .progress-fill.uploading { background: var(--accent); }
    .progress-fill.done { background: var(--success); }
    .progress-fill.error { background: var(--danger); }
    .progress-fill.paused { background: var(--warning); }
    .progress-stats { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }

    /* Status badge */
    .status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600;
    }
    .status-badge.pending  { background: rgba(120,128,168,.15); color: var(--text-muted); }
    .status-badge.uploading{ background: rgba(108,99,255,.15); color: var(--accent); }
    .status-badge.paused   { background: rgba(245,166,35,.15); color: var(--warning); }
    .status-badge.done     { background: rgba(67,212,158,.15); color: var(--success); }
    .status-badge.error    { background: rgba(240,90,90,.15); color: var(--danger); }
    .status-badge.waiting_file { background: rgba(245,166,35,.15); color: var(--warning); }

    /* ── Overall Stats ── */
    .stats-bar {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
    .stat .value { font-size: 18px; font-weight: 700; }
    .stat .value.accent { color: var(--accent); }
    .stat .value.success { color: var(--success); }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 8px;
      animation: slideIn .25s ease; box-shadow: var(--shadow); min-width: 220px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-tip {
      text-align: center; padding: 32px 24px; color: var(--text-muted);
      background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .empty-tip .big { font-size: 40px; margin-bottom: 10px; }

    @media (max-width: 640px) {
      main { padding: 16px; }
      .settings-bar { flex-direction: column; align-items: flex-start; }
      .file-item-top { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">filom <span>/ 大文件上传</span></a>
  <a class="back-btn" href="/">← 返回首页</a>
</header>

<main>

  <div>
    <h1>🚀 大文件断点续传</h1>
    <p class="subtitle">支持分片上传、暂停恢复、断线续传，单文件无大小限制</p>
  </div>

  <!-- Settings -->
  <div class="settings-bar">
    <label>
      分片大小
      <input type="range" id="chunk-size-slider" min="1" max="4" value="4" oninput="updateChunkSize(this.value)" step="1" />
      <span class="val" id="chunk-size-val">100 MB</span>
    </label>
    <label>
      并发数
      <select id="concurrency-select">
        <option value="1">1 个</option>
        <option value="2">2 个</option>
        <option value="3">3 个</option>
        <option value="5">5 个</option>
        <option value="8">8 个</option>
        <option value="10" selected>10 个</option>
      </select>
    </label>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" multiple />
    <div class="dz-icon">📦</div>
    <div class="dz-title">点击选择文件，或将文件拖拽到此处</div>
    <div class="dz-sub">支持任意格式、任意大小，文件将自动切片上传</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><div class="label">文件总数</div><div class="value accent" id="stat-total">0</div></div>
    <div class="stat"><div class="label">已完成</div><div class="value success" id="stat-done">0</div></div>
    <div class="stat"><div class="label">总大小</div><div class="value" id="stat-size">0 B</div></div>
    <div class="stat"><div class="label">上传速度</div><div class="value" id="stat-speed">—</div></div>
    <div style="margin-left:auto">
      <button class="btn btn-primary" id="btn-start-all" onclick="startAll()">▶ 全部开始</button>
      <button class="btn btn-ghost" id="btn-pause-all" onclick="pauseAll()">⏸ 全部暂停</button>
      <button class="btn btn-danger" id="btn-clear-done" onclick="clearDone()">🗑 清除已完成</button>
    </div>
  </div>

  <!-- Queue header -->
  <div class="queue-header" id="queue-header" style="display:none">
    <h2>上传队列</h2>
  </div>

  <!-- File list -->
  <div class="file-list" id="file-list">
    <div class="empty-tip" id="empty-tip">
      <div class="big">📂</div>
      <div>选择文件后，任务将出现在这里</div>
    </div>
  </div>

</main>

<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════
//  Config
// ═══════════════════════════════════════════════════
let CHUNK_SIZE = 100 * 1024 * 1024;  // 100 MB default
let CONCURRENCY = 10;

function updateChunkSize(v) {
  const map = { 1: 10, 2: 25, 3: 50, 4: 100 };
  const mb = map[v] || 100;
  CHUNK_SIZE = mb * 1024 * 1024;
  document.getElementById('chunk-size-val').textContent = mb + ' MB';
}
document.getElementById('concurrency-select').addEventListener('change', e => {
  CONCURRENCY = Number(e.target.value);
});

// ═══════════════════════════════════════════════════
//  Helpers
// ═══════════════════════════════════════════════════
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function formatBytes(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
}

function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const map = {
    pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', ppt:'📑', pptx:'📑',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', webp:'🖼️', svg:'🖼️',
    mp4:'🎬', mov:'🎬', avi:'🎬', mkv:'🎬', mp3:'🎵', wav:'🎵', flac:'🎵',
    zip:'🗜️', rar:'🗜️', '7z':'🗜️', tar:'🗜️', gz:'🗜️',
    txt:'📃', json:'🔧', js:'🔧', ts:'🔧', html:'🌐', css:'🎨', sh:'💻', py:'🐍',
    iso:'💿', dmg:'💿', exe:'⚙️', apk:'📱',
  };
  return map[ext] || '📦';
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  LocalStorage 持久化
// ═══════════════════════════════════════════════════
const LS_KEY = 'filom_upload_tasks';

function saveTasksToLS() {
  // 只保存任务元数据，不保存 file 对象
  const data = [...tasks.values()].map(t => ({
    id: t.id,
    name: t.name,
    size: t.size,
    totalChunks: t.totalChunks,
    chunkSize: t.chunkSize,
    uploadId: t.uploadId,
    status: t.status,
    error: t.error,
    savedName: t.savedName,
    // 不保存 file, uploadedChunks, inFlight, abortController 等运行时数据
  }));
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(data));
  } catch (e) {
    // localStorage 满了或不可用
    console.warn('localStorage 保存失败:', e.message);
  }
}

function loadTasksFromLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) {
    return [];
  }
}

function removeTaskFromLS(id) {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const arr = JSON.parse(raw).filter(t => t.id !== id);
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
  } catch (_) {}
}

// ═══════════════════════════════════════════════════
//  Task State
// ═══════════════════════════════════════════════════
// status: 'pending' | 'uploading' | 'paused' | 'done' | 'error'
const tasks = new Map(); // id -> task obj
let taskIdCounter = 0;
let globalSpeedBytes = 0;
let lastSpeedTs = Date.now();
let lastSpeedLoaded = 0;

function createTask(file, existingUploadId = null) {
  const id = ++taskIdCounter;
  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  const task = {
    id,
    file,
    name: file.name,
    size: file.size,
    totalChunks,
    chunkSize: CHUNK_SIZE,
    uploadId: existingUploadId,  // 如果有则复用
    uploadedChunks: new Set(),
    inFlight: new Map(),   // chunkIndex -> loadedBytes (实时进度)
    status: 'pending',
    loaded: 0,
    speed: 0,
    speedDisplay: 0,        // 稳定显示的速度
    error: null,
    abortController: null,
    savedName: null,
    _lastLoaded: 0,
    _lastTs: Date.now(),
    _needsFile: !existingUploadId,  // 是否需要用户重新选择文件
  };
  tasks.set(id, task);
  saveTasksToLS();
  return task;
}

// ═══════════════════════════════════════════════════
//  DOM: Queue rendering
// ═══════════════════════════════════════════════════
function renderTask(task) {
  let el = document.getElementById('task-' + task.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'task-' + task.id;
    el.className = 'file-item';
    document.getElementById('file-list').appendChild(el);
    document.getElementById('empty-tip').style.display = 'none';
  }

  const pct = task.size === 0 ? 100 : Math.round(task.loaded / task.size * 100);
  const statusText = {
    pending:'等待选择文件',
    uploading:'上传中',
    paused:'已暂停',
    done:'完成',
    error:'出错',
    waiting_file:'等待重新选择文件'
  }[task.status] || task.status;

  const speedStr = task.status === 'uploading' && task.speedDisplay > 0 ? formatBytes(task.speedDisplay) + '/s' : '';
  const chunksStr = task.totalChunks > 1 ? `${task.uploadedChunks.size}/${task.totalChunks} 片` : '';

  let actionBtns = '';
  if (task.status === 'pending' || task.status === 'waiting_file') {
    // 需要用户重新选择文件
    actionBtns += `<button class="btn btn-primary btn-sm" onclick="reSelectFile(${task.id})">📁 选择文件</button>`;
  }
  if (task.status === 'paused' || task.status === 'error') {
    actionBtns += `<button class="btn btn-primary btn-sm" onclick="startTask(${task.id})">▶ 继续</button>`;
  }
  if (task.status === 'uploading') {
    actionBtns += `<button class="btn btn-ghost btn-sm" onclick="pauseTask(${task.id})">⏸ 暂停</button>`;
  }
  if (task.status !== 'done') {
    actionBtns += `<button class="btn btn-danger btn-sm" onclick="removeTask(${task.id})">✕</button>`;
  }

  el.className = 'file-item ' + task.status;
  el.innerHTML = `
    <div class="file-item-top">
      <div class="file-icon-big">${task.status === 'waiting_file' ? '⏳' : fileIcon(task.name)}</div>
      <div class="file-meta">
        <div class="name" title="${escHtml(task.name)}">${escHtml(task.name)}</div>
        <div class="info">
          <span>${formatBytes(task.size)}</span>
          ${chunksStr ? `<span>${chunksStr}</span>` : ''}
          ${speedStr ? `<span>⚡ ${speedStr}</span>` : ''}
          ${task.error ? `<span style="color:var(--danger)">${escHtml(task.error)}</span>` : ''}
          ${task.uploadId ? `<span style="color:var(--text-muted)">ID: ${task.uploadId.slice(0,8)}</span>` : ''}
        </div>
      </div>
      <span class="status-badge ${task.status}">${statusText}</span>
      <div class="file-item-actions">${actionBtns}</div>
    </div>
    ${task.status !== 'pending' && task.status !== 'waiting_file' ? `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill ${task.status}" style="width:${pct}%"></div></div>
      <div class="progress-stats">
        <span>${formatBytes(task.loaded)} / ${formatBytes(task.size)}</span>
        <span>${pct}%</span>
      </div>
    </div>` : ''}
  `;
}

function updateStats() {
  const all = [...tasks.values()];
  if (all.length === 0) {
    document.getElementById('stats-bar').style.display = 'none';
    document.getElementById('queue-header').style.display = 'none';
    return;
  }
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('queue-header').style.display = 'flex';
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-done').textContent = all.filter(t => t.status === 'done').length;
  document.getElementById('stat-size').textContent = formatBytes(all.reduce((s, t) => s + t.size, 0));

  const now = Date.now();
  const totalLoaded = all.reduce((s, t) => s + t.loaded, 0);
  const dt = (now - lastSpeedTs) / 1000;
  if (dt > 0.5) {
    const speed = Math.max(0, (totalLoaded - lastSpeedLoaded) / dt);
    if (speed > 100) {
      document.getElementById('stat-speed').textContent = formatBytes(speed) + '/s';
    }
    lastSpeedTs = now;
    lastSpeedLoaded = totalLoaded;
  }
}

// ═══════════════════════════════════════════════════
//  Upload Logic
// ═══════════════════════════════════════════════════

async function initUpload(task) {
  const res = await fetch('/api/upload/init', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fileName: task.name, totalChunks: task.totalChunks, fileSize: task.size }),
  });
  if (!res.ok) throw new Error('初始化失败 ' + res.status);
  const data = await res.json();
  task.uploadId = data.uploadId;
}

async function fetchUploadedChunks(task) {
  if (!task.uploadId) return;
  try {
    const res = await fetch('/api/upload/' + task.uploadId + '/status');
    if (res.ok) {
      const data = await res.json();
      (data.uploadedChunks || []).forEach(i => task.uploadedChunks.add(i));
      task.loaded = Math.min(task.size, task.uploadedChunks.size * task.chunkSize);
    }
  } catch (_) {}
}

function uploadChunk(task, chunkIndex, signal) {
  return new Promise((resolve, reject) => {
    const start = chunkIndex * task.chunkSize;
    const end = Math.min(start + task.chunkSize, task.size);
    const blob = task.file.slice(start, end);

    const fd = new FormData();
    fd.append('chunk', blob, task.name + '.part' + chunkIndex);

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload/' + task.uploadId + '/chunk?chunkIndex=' + chunkIndex);

    // 监听 abort
    let aborted = false;
    if (signal) {
      signal.addEventListener('abort', () => { aborted = true; xhr.abort(); });
    }

    // 记录该分片进入 inFlight
    task.inFlight.set(chunkIndex, 0);

    xhr.upload.onprogress = e => {
      if (e.lengthComputable && !aborted) {
        // 精确计算 loaded：已完成分片完整大小 + 各 inFlight 分片当前进度
        let inFlightBytes = 0;
        task.inFlight.forEach(loaded => { inFlightBytes += loaded; });
        task.loaded = Math.min(task.size,
          task.uploadedChunks.size * task.chunkSize + inFlightBytes
        );
        task.inFlight.set(chunkIndex, e.loaded);

        // 速度：基于整体 loaded 变化
        const now = Date.now();
        const dt = (now - task._lastTs) / 1000;
        if (dt > 0.3) {
          task.speed = Math.max(0, (task.loaded - task._lastLoaded) / dt);
          task.speedDisplay = task.speed;
          task._lastTs = now;
          task._lastLoaded = task.loaded;
        }
        renderTask(task);
        updateStats();
      }
    };

    xhr.onload = () => {
      if (xhr.status === 200) {
        task.uploadedChunks.add(chunkIndex);
        task.inFlight.delete(chunkIndex);
        task.loaded = Math.min(task.size, task.uploadedChunks.size * task.chunkSize);
        renderTask(task);
        updateStats();
        resolve();
      } else {
        task.inFlight.delete(chunkIndex);
        reject(new Error('分片 ' + chunkIndex + ' 上传失败 (' + xhr.status + ')'));
      }
    };
    xhr.onerror = () => { task.inFlight.delete(chunkIndex); aborted ? reject(new DOMException('aborted','AbortError')) : reject(new Error('网络错误')); };
    xhr.onabort = () => { task.inFlight.delete(chunkIndex); reject(new DOMException('aborted','AbortError')); };
    xhr.send(fd);
  });
}

async function uploadAllChunks(task) {
  const pending = [];
  for (let i = 0; i < task.totalChunks; i++) {
    if (!task.uploadedChunks.has(i)) pending.push(i);
  }

  // 并发池
  let idx = 0;
  const concurrency = CONCURRENCY;

  async function worker() {
    while (idx < pending.length) {
      if (task.status !== 'uploading') return;
      const chunkIndex = pending[idx++];
      await uploadChunk(task, chunkIndex, task.abortController.signal);
    }
  }

  const workers = [];
  for (let i = 0; i < Math.min(concurrency, pending.length); i++) {
    workers.push(worker());
  }
  await Promise.all(workers);
}

async function mergeChunks(task) {
  const res = await fetch('/api/upload/' + task.uploadId + '/merge', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fileName: task.name, totalChunks: task.totalChunks }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: '合并失败' }));
    throw new Error(err.error || '合并失败');
  }
  const data = await res.json();
  task.savedName = data.savedName;
}

async function startTask(id) {
  const task = tasks.get(id);
  if (!task || task.status === 'uploading' || task.status === 'done') return;

  // 如果需要文件对象但不存在，提示用户选择
  if (task._needsFile || !task.file) {
    task.status = 'waiting_file';
    renderTask(task);
    toast('⚠️ 请重新选择文件以继续上传', 'info');
    return;
  }

  task.status = 'uploading';
  task.error = null;
  task.abortController = new AbortController();
  task.speedDisplay = 0;
  saveTasksToLS();
  renderTask(task);

  try {
    // 1. 初始化（如果还没有 uploadId）
    if (!task.uploadId) {
      await initUpload(task);
      saveTasksToLS();
    }

    // 2. 断点续传：拉取已上传分片列表
    await fetchUploadedChunks(task);
    // 重置速度计时器（loaded 刚被刷新，避免速度跳变）
    task._lastTs = Date.now();
    task._lastLoaded = task.loaded;

    // 3. 上传所有缺失分片
    await uploadAllChunks(task);

    // 检查是否被暂停
    if (task.status !== 'uploading') return;

    // 4. 合并
    await mergeChunks(task);

    task.status = 'done';
    task.loaded = task.size;
    task.speed = 0;
    saveTasksToLS();
    renderTask(task);
    updateStats();
    toast('✅ ' + task.name + ' 上传完成', 'success');

  } catch (e) {
    if (e.name === 'AbortError' || task.status === 'paused') {
      task.status = 'paused';
    } else {
      task.status = 'error';
      task.error = e.message;
      toast('❌ ' + task.name + '：' + e.message, 'error');
    }
    task.speed = 0;
    saveTasksToLS();
    renderTask(task);
    updateStats();
  }
}

function pauseTask(id) {
  const task = tasks.get(id);
  if (!task || task.status !== 'uploading') return;
  task.status = 'paused';
  task.speed = 0;
  task.speedDisplay = 0;
  if (task.abortController) task.abortController.abort();
  saveTasksToLS();
  renderTask(task);
  updateStats();
  toast('⏸ ' + task.name + ' 已暂停，可继续上传', 'info');
}

function removeTask(id) {
  const task = tasks.get(id);
  if (!task) return;
  if (task.status === 'uploading') {
    task.status = 'paused';
    if (task.abortController) task.abortController.abort();
  }
  tasks.delete(id);
  removeTaskFromLS(id);
  const el = document.getElementById('task-' + id);
  if (el) el.remove();
  if (tasks.size === 0) {
    document.getElementById('empty-tip').style.display = '';
  }
  updateStats();
}

// 重新选择文件（用于页面刷新后恢复）
function reSelectFile(taskId) {
  const task = tasks.get(taskId);
  if (!task) return;

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '*/*';

  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;

    // 验证文件一致性（大小必须匹配）
    if (file.size !== task.size) {
      toast('❌ 文件大小不匹配，请选择相同的文件', 'error');
      return;
    }

    // 关联文件对象
    task.file = file;
    task._needsFile = false;
    task._lastTs = Date.now();
    task._lastLoaded = 0;

    renderTask(task);
    saveTasksToLS();

    // 自动从后端拉取断点状态
    if (task.uploadId) {
      try {
        const res = await fetch('/api/upload/' + task.uploadId + '/status');
        if (res.ok) {
          const data = await res.json();
          const oldSize = task.uploadedChunks.size;
          (data.uploadedChunks || []).forEach(i => task.uploadedChunks.add(i));
          if (task.uploadedChunks.size > oldSize) {
            task.loaded = Math.min(task.size, task.uploadedChunks.size * task.chunkSize);
            toast(`📥 已恢复 ${task.uploadedChunks.size} 个已上传分片`, 'info');
          }
        }
      } catch (_) {}
    }

    renderTask(task);
    toast('✅ 文件已关联，自动继续上传', 'success');

    // 自动开始上传
    startTask(taskId);
  });

  input.click();
}

function startAll() {
  for (const task of tasks.values()) {
    if (task.status === 'pending' || task.status === 'waiting_file' || task.status === 'paused' || task.status === 'error') {
      startTask(task.id);
    }
  }
}

function pauseAll() {
  for (const task of tasks.values()) {
    if (task.status === 'uploading') pauseTask(task.id);
  }
}

function clearDone() {
  for (const task of [...tasks.values()]) {
    if (task.status === 'done') {
      removeTaskFromLS(task.id);
      tasks.delete(task.id);
      const el = document.getElementById('task-' + task.id);
      if (el) el.remove();
    }
  }
  if (tasks.size === 0) {
    document.getElementById('empty-tip').style.display = '';
  }
  localStorage.removeItem(LS_KEY);  // 清理已完成任务
  updateStats();
}

// ═══════════════════════════════════════════════════
//  File Selection & Drop
// ═══════════════════════════════════════════════════
function addFiles(files) {
  if (!files || !files.length) return;
  for (const file of files) {
    // 检查是否已有相同文件的任务（通过 uploadId 匹配）
    const existingTask = findExistingTask(file);
    if (existingTask) {
      // 复用已有任务的 uploadId，继续上传
      const task = createTask(file, existingTask.uploadId);
      task.uploadedChunks = existingTask.uploadedChunks;
      task.loaded = existingTask.loaded || (task.uploadedChunks.size * task.chunkSize);
      renderTask(task);
      startTask(task.id);
    } else {
      const task = createTask(file);
      renderTask(task);
      // 自动开始
      startTask(task.id);
    }
  }
  updateStats();
}

// 根据文件名和大小查找已存在的任务
function findExistingTask(file) {
  for (const task of tasks.values()) {
    if (task.name === file.name && task.size === file.size && task.uploadId) {
      return task;
    }
  }
  return null;
}

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});

// ═══════════════════════════════════════════════════
//  页面加载时恢复任务
// ═══════════════════════════════════════════════════
async function restoreTasks() {
  const savedTasks = loadTasksFromLS();
  if (savedTasks.length === 0) return;

  console.log(`📥 从 localStorage 恢复 ${savedTasks.length} 个任务...`);

  for (const saved of savedTasks) {
    // 跳过已完成的
    if (saved.status === 'done') continue;

    // 创建占位任务（需要用户重新选择文件）
    const task = {
      id: ++taskIdCounter,
      file: null,  // 需要重新选择
      name: saved.name,
      size: saved.size,
      totalChunks: saved.totalChunks,
      chunkSize: saved.chunkSize,
      uploadId: saved.uploadId,
      uploadedChunks: new Set(),
      inFlight: new Map(),
      status: 'waiting_file',
      loaded: 0,
      speed: 0,
      speedDisplay: 0,
      error: saved.error,
      abortController: null,
      savedName: null,
      _lastLoaded: 0,
      _lastTs: Date.now(),
      _needsFile: true,
    };
    tasks.set(task.id, task);

    // 尝试从后端获取已上传分片状态
    if (task.uploadId) {
      try {
        const res = await fetch('/api/upload/' + task.uploadId + '/status');
        if (res.ok) {
          const data = await res.json();
          if (data.uploadedChunks && data.uploadedChunks.length > 0) {
            data.uploadedChunks.forEach(i => task.uploadedChunks.add(i));
            task.loaded = Math.min(task.size, task.uploadedChunks.size * task.chunkSize);
            console.log(`  ✅ ${task.name}: 已恢复 ${task.uploadedChunks.size} 个分片`);
          }
        }
      } catch (_) {}
    }
  }

  // 重新渲染所有恢复的任务
  for (const task of tasks.values()) {
    renderTask(task);
  }

  updateStats();

  if (tasks.size > 0) {
    toast(`📥 发现 ${tasks.size} 个未完成的上传任务，请重新选择文件继续`, 'info');
  }
}

// 页面加载时自动恢复
restoreTasks();
</script>
